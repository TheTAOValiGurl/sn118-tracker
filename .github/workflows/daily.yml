name: Daily SN118 Alpha Tracker

on:
  schedule:
      - cron: '30 15 * * *'
        workflow_dispatch:

        jobs:
          run-tracker:
              runs-on: ubuntu-latest
                  permissions:
                        contents: write

                            steps:
                                  - name: Check out repository
                                          uses: actions/checkout@v4

                                                - name: Set up Python
                                                        uses: actions/setup-python@v5
                                                                with:
                                                                          python-version: '3.11'

                                                                                - name: Install dependencies
                                                                                        run: pip install requests

                                                                                              - name: Pull latest CSV
                                                                                                      continue-on-error: true
                                                                                                              run: git pull origin main
                                                                                                              
                                                                                                                    - name: Run tracker
                                                                                                                            env:
                                                                                                                                      TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
                                                                                                                                              run: python tracker.py
                                                                                                                                              
                                                                                                                                                    - name: Save CSV to repository
                                                                                                                                                            run: |
                                                                                                                                                                      git config user.name "github-actions[bot]"
                                                                                                                                                                                git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                          git add sn118_daily_alpha.csv
                                                                                                                                                                                                    git diff --staged --quiet || git commit -m "Daily snapshot $(date -u '+%Y-%m-%d')"
                                                                                                                                                                                                              git push
